methodology_summary: >
  DeepShortlist v2 is a 5-stage fully offline ranking pipeline.
  Stage 1: Dynamic schema detection auto-discovers candidate field names.
  Stage 2: Field-weighted BM25+ (title×3, skills×2.5) retrieves top-3000.
  Stage 3: TF-IDF+LSA (TruncatedSVD, 120 dims) reranks via cosine similarity.
  Stage 4: RRF ensemble (k=60) fuses retrieval, skill, availability, and
  trajectory rankings. Penalties applied pre-RRF. Percentile sigmoid stretch
  ensures wide score distribution. Stage 5: AI-parseable structured reasoning.
  No LLM. No model downloads. ~13s on 100K candidates, ~200MB RAM.
