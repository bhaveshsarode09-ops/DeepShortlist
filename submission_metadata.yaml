methodology_summary: >
  DeepShortlist is a 4-stage CPU-native ranking pipeline.
  Stage 1: FAISS-accelerated semantic first-pass using all-MiniLM-L6-v2 embeddings
  retrieves the top-2000 candidates by cosine similarity to the JD.
  Stage 2: Each candidate in the pool is scored on 6 dimensions —
  semantic fit (30%), required skill coverage (20%), career trajectory (15%),
  availability/behavioral signals from 23 redrob_signals (20%),
  GitHub/platform engagement (10%), and location (5%).
  Penalty multipliers are applied for wrong job families, consulting-only
  backgrounds, disqualified domains, and research-only profiles.
  Stage 3: A multi-rule honeypot detector eliminates impossible profiles
  before ranking. Stage 4: Fact-based, tier-aware reasoning is generated
  for each of the final 100 candidates without hallucination.
